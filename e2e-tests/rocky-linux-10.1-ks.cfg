# Rocky Linux 10.1 minimal kickstart for rack-director e2e testing.
#
# The partition-disks action has already created the partition layout:
#   vda1 = BIOS Boot (1MiB, bios_grub flag) - used by GRUB2 on GPT+BIOS
#   vda2 = EFI     (512MiB, vfat)           - not used for BIOS boot
#   vda3 = root    (remaining, ext4)
#
# This kickstart installs Rocky Linux onto the existing root partition and
# configures GRUB to boot from it.  After installation the %post script reads
# the SMBIOS UUID and calls the rack-director action_success endpoint so the
# device transitions to the "provisioned" lifecycle state.

install
text

lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone UTC --utc
rootpw --plaintext changeme

# Install GRUB2 to /dev/vda.  With GPT + SeaBIOS, GRUB automatically uses the
# BIOS Boot partition (vda1, type GUID 21686148...) to store its core image.
bootloader --boot-drive=vda

# Use the existing root partition created by partition-disks.
# --onpart uses the partition as-is without modifying the partition table.
part / --fstype=ext4 --onpart=vda3

reboot

%packages --no-install-recommends
@^minimal-environment
%end

%post --nochroot --log=/mnt/sysimage/var/log/rack-director-post.log
# Read the SMBIOS system UUID — the same identifier rack-director registered
# for this device during the device-scan action.
UUID=$(dmidecode -s system-uuid 2>/dev/null)
UUID=$(echo "$UUID" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

echo "rack-director post: system UUID=${UUID}"

if [ -n "$UUID" ]; then
    /usr/bin/curl -sf --max-time 30 --retry 5 --retry-delay 5 \
        -X POST http://10.0.0.1:3000/cnc/action_success \
        -H "Content-Type: application/json" \
        -d "{\"uuid\":\"${UUID}\"}"
    echo "rack-director post: action_success status=$?"
else
    echo "rack-director post: WARNING: could not read SMBIOS UUID; skipping action_success"
fi
%end
