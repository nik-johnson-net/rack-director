# Rocky Linux 10.1 minimal kickstart for rack-director e2e testing.
#
# The partition-disks action has already created the partition layout and
# the resolved partition paths are provided via template variables:
#   partitions      - list of all partitions (disk, device, device_name, label,
#                     size, filesystem, mount_point, flags, volume_group)
#   logical_volumes - list of LVM logical volumes (device, vg_name, lv_name,
#                     size, filesystem, mount_point)
#
# Partitions with no mount_point (bios_grub, LVM PVs) are omitted from the
# kickstart; the installer uses the pre-existing partition table as-is.

cmdline

# Installation source: Rocky Linux 10.1 official mirror (BaseOS + AppStream).
# inst.repo is not passed on the kernel cmdline, so we must declare the source
# here.  @^minimal-environment pulls packages from both BaseOS and AppStream.
url --url=https://dl.rockylinux.org/pub/rocky/10.1/BaseOS/x86_64/os/
repo --name=appstream --baseurl=https://dl.rockylinux.org/pub/rocky/10.1/AppStream/x86_64/os/

lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone UTC --utc
rootpw --plaintext changeme

clearpart --none

# Network
network --bootproto=static --ip={{ device.ip_address }} --netmask={{ device.netmask }} --gateway={{ device.gateway }} --nameserver={{ device.dns_servers }} --hostname={{ device.hostname }} --device={{ device.mac_address }}

# Pre-existing partitions (created by partition_disks action).
# --noformat preserves existing data; --onpart references the pre-created partition.
# Partitions with no mount_point (bios_grub, LVM PVs) are omitted.
{{#each partitions}}{{#if this.mount_point}}{{#unless this.volume_group}}
part {{this.mount_point}} --fstype="{{this.filesystem}}" --onpart={{this.device_name}} --noformat
{{/unless}}{{/if}}{{/each}}

# LVM: declare pre-existing VGs and LVs.
# Each unique VG is declared once; logvol entries reference pre-existing LVs.
{{#each logical_volumes}}{{#if this.mount_point}}
logvol {{this.mount_point}} --vgname={{this.vg_name}} --name={{this.lv_name}} --fstype={{this.filesystem}} --noformat --useexisting
{{/if}}{{/each}}

# With GPT + SeaBIOS, GRUB automatically uses the bios_grub partition to store
# its core image; no --boot-drive needed.
bootloader

reboot

%packages
@^minimal-environment
%end

%post --nochroot --log=/mnt/sysimage/var/log/rack-director-post.log
# Read the SMBIOS system UUID — the same identifier rack-director registered
# for this device during the device-scan action.
UUID=$(dmidecode -s system-uuid 2>/dev/null)
UUID=$(echo "$UUID" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

echo "rack-director post: system UUID=${UUID}"

if [ -n "$UUID" ]; then
    /usr/bin/curl -sf --max-time 30 --retry 5 --retry-delay 5 \
        -X POST http://10.0.0.1:3000/cnc/action_success \
        -H "Content-Type: application/json" \
        -d "{\"uuid\":\"${UUID}\"}"
    echo "rack-director post: action_success status=$?"
else
    echo "rack-director post: WARNING: could not read SMBIOS UUID; skipping action_success"
fi
%end
