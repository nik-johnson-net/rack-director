name: Pull Request

on:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-rust:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.92.0
      with:
        components: clippy rustfmt
    - name: Load Cache
      uses: actions/cache@v5
      with:
        key: target-${{ hashFiles('Cargo.lock') }}
        path: |
          target
        restore-keys: |
          target-
    - name: Format Check
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy
    - name: Build
      run: cargo build
    - name: Run tests
      run: cargo test
  
  check-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rack-director-ui

    steps:
    - uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: rack-director-ui/package-lock.json
    - name: npm install
      run: npm install
    - name: eslint
      run: npx eslint
    - name: Install Vite
      run: npm install -D vite
    - name: Build rack-director-ui
      run: npx vite build

  check-osm:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.92.0
    - name: Validate OSM
      run: cargo run --bin rack-director-osm -- build
      working-directory: default-osm

  docker:
    runs-on: ubuntu-latest
    needs: [check-rust, check-ui, check-osm]

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        file: ./docker/Dockerfile
