name = "AlmaLinux"
release = "10"

[[architectures]]
arch = "x86-64"
kernel = "vmlinuz-x86_64"
initramfs = "initrd-x86_64.img"
install_template = "almalinux-x86_64.ks"
cmdline = "inst.ks={{install_script_url}} inst.nomux"

[[template_variables]]
name = "packages"
type = "list"
description = "Additional packages to install"

[[template_variables]]
name = "rootpw"
type = "string"
required = true
description = "Encrypted password to use for root"

[[template_variables]]
name = "postinstall"
type = "string"
default = ""
description = "Post install script to run"

[[template_variables]]
name = "halt"
type = "boolean"
default = false
description = "Halt instead of reboot after installation"

[[build.file_download]]
filename = "vmlinuz-x86_64"
url = "https://repo.almalinux.org/almalinux/10/BaseOS/x86_64/os/images/pxeboot/vmlinuz"

[[build.file_download]]
filename = "initrd-x86_64.img"
url = "https://repo.almalinux.org/almalinux/10/BaseOS/x86_64/os/images/pxeboot/initrd.img"
