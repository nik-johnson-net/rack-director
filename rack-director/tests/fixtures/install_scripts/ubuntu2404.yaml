#cloud-config
# Ubuntu 24.04 Autoinstall - generated by rack-director
# OS: {{ os.name }} {{ os.version }}
# Device: {{ device.uuid }}
autoinstall:
  version: 1
  identity:
    hostname: {{ device.hostname }}
    username: ubuntu
    password: "!"
  network:
    network:
      version: 2
      ethernets:
        primary:
          match:
            macaddress: "{{ device.mac_address }}"
          addresses:
            - "{{ device.ip_address }}/{{ device.prefix_length }}"
          routes:
            - to: default
              via: {{ device.gateway }}
          nameservers:
            addresses: [{{ device.dns_servers }}]
  storage:
    layout:
      name: custom
    config:
{{#each partitions}}
      - id: part-{{ this.label }}
        type: partition
        device: {{ this.disk }}
        preserve: true
{{#if this.mount_point}}
      - id: fmt-{{ this.label }}
        type: format
        volume: part-{{ this.label }}
        fstype: {{ this.filesystem }}
        preserve: true
      - id: mnt-{{ this.label }}
        type: mount
        device: fmt-{{ this.label }}
        path: {{ this.mount_point }}
{{/if}}
{{/each}}
{{#each logical_volumes}}
{{#if this.mount_point}}
      - id: lv-{{ this.lv_name }}
        type: lvm_partition
        volgroup: {{ this.vg_name }}
        preserve: true
      - id: fmt-lv-{{ this.lv_name }}
        type: format
        volume: lv-{{ this.lv_name }}
        fstype: {{ this.filesystem }}
      - id: mnt-lv-{{ this.lv_name }}
        type: mount
        device: fmt-lv-{{ this.lv_name }}
        path: {{ this.mount_point }}
{{/if}}
{{/each}}
  packages:
    - openssh-server
  late-commands:
    - echo "rack-director-provisioned" > /target/etc/rack-director
